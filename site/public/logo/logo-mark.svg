<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ring 3: Outer orbit -->
  <circle cx="50" cy="50" r="38" stroke="#1B3A5C" stroke-width="1.2" fill="none"/>
  <!-- Ring 2: Middle orbit -->
  <circle cx="50" cy="50" r="27" stroke="#1B3A5C" stroke-width="1.2" fill="none"/>
  <!-- Ring 1: Inner orbit -->
  <circle cx="50" cy="50" r="16" stroke="#1B3A5C" stroke-width="1.2" fill="none"/>
  <!-- Bindu: Central sun -->
  <circle cx="50" cy="50" r="5" fill="#D4A843"/>
  <!-- Planet on Ring 1: ~1 o'clock position -->
  <circle cx="65.45" cy="54.14" r="2.2" fill="#1B3A5C"/>
  <!-- Planet on Ring 2: ~7 o'clock position -->
  <circle cx="24.63" cy="59.23" r="2.8" fill="#2E75B6"/>
  <!-- Gold arc on Ring 3: 12 o'clock to 10 o'clock, 60 degree sweep -->
  <path d="M 50 12 A 38 38 0 0 0 31.0 17.1" stroke="#D4A843" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
