name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # A stale version does not make a publish fail — the "already published"
  # branch in publish-crates exists so a re-run of a partially-failed release
  # can continue, and it swallows a version that was never bumped. That is how
  # v3.2.0 shipped with a Cargo.lock still pinning 3.1.0, and how the Python
  # wheel sat at 3.0.1 across two releases before it was removed from this
  # repo. Fail the tag before anything ships instead.
  version-check:
    name: Versions match the tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert published versions equal ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          fail=0
          check() {
            if [ "$2" = "$tag" ]; then
              echo "ok: $1 = $2"
            else
              echo "::error::$1 is '$2', expected '$tag'"
              fail=1
            fi
          }
          check "Cargo.toml [workspace.package] version" \
            "$(sed -n '/^\[workspace.package\]/,/^\[/s/^version = "\(.*\)"/\1/p' Cargo.toml)"
          check "Cargo.lock vedaksha entry" \
            "$(sed -n '/^name = "vedaksha"$/{n;s/^version = "\(.*\)"/\1/p;}' Cargo.lock | head -1)"
          exit $fail

  build-mcp:
    name: Build MCP binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # x86-64-v3 raises the floor to AVX2 (Intel Haswell 2013+ / AMD
          # Excavator+), which is what makes the SIMD lunar kernel run 4-wide.
          # Hosts without AVX2 will SIGILL — lower to x86-64-v2 (or empty) if
          # broad pre-2013 x86 support is required.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vedaksha-mcp
            rustflags: "-C target-cpu=x86-64-v3"
          # aarch64 already includes NEON at baseline; no extra flag needed.
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vedaksha-mcp
            rustflags: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} -p vedaksha-mcp
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/vedaksha-mcp-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: dist/

  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack
      - name: Build WASM
        # +simd128 makes wide's f64x4 vectorize the lunar kernel in the
        # browser (otherwise it falls back to scalar). Universally supported
        # by current browsers/runtimes; a runtime without simd128 cannot
        # instantiate the module.
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
        run: wasm-pack build --target web crates/vedaksha-wasm/
      - uses: actions/upload-artifact@v4
        with:
          name: vedaksha-wasm
          path: crates/vedaksha-wasm/pkg/

  publish-crates:
    name: Publish to crates.io
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -eo pipefail
          # v3.0.0: vedaksha-emit folded into vedaksha-graph[emitters];
          # vedaksha-locale folded into vedaksha[locale]; vedaksha-wasm
          # is published to npm only (publish = false in its Cargo.toml).
          for crate in vedaksha-math vedaksha-ephem-core vedaksha-graph vedaksha-astro vedaksha-vedic vedaksha-mcp vedaksha; do
            echo "::group::Publishing $crate"
            log=$(mktemp)
            if cargo publish -p "$crate" --allow-dirty 2>&1 | tee "$log"; then
              echo "::endgroup::"
              echo "published $crate"
            else
              if grep -qEi 'already.{0,15}(exists|uploaded|published)|crate version.*is already' "$log"; then
                echo "::endgroup::"
                echo "skip $crate (already on crates.io)"
              else
                echo "::endgroup::"
                echo "::error::$crate publish failed — see log above"
                exit 1
              fi
            fi
            sleep 60
          done

  publish-npm:
    name: Publish to npm
    needs: [wasm, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vedaksha-wasm
          path: crates/vedaksha-wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        working-directory: crates/vedaksha-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  docker:
    name: Push Docker image
    needs: [version-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/arthiqlabs/vedaksha-mcp:latest
            ghcr.io/arthiqlabs/vedaksha-mcp:${{ github.ref_name }}

  github-release:
    name: Create GitHub Release
    needs: [build-mcp, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: 'mcp-*'
      - uses: actions/download-artifact@v4
        with:
          name: vedaksha-wasm
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mcp-*/**/*
            vedaksha-wasm/**/*
