name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack
      - name: Build WASM
        run: wasm-pack build --target web crates/vedaksha-wasm/
      - uses: actions/upload-artifact@v4
        with:
          name: vedaksha-wasm
          path: crates/vedaksha-wasm/pkg/

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p vedaksha-math --allow-dirty
          sleep 30
          cargo publish -p vedaksha-ephem-core --allow-dirty
          sleep 30
          cargo publish -p vedaksha-graph --allow-dirty
          sleep 30
          cargo publish -p vedaksha-astro --allow-dirty
          sleep 30
          cargo publish -p vedaksha-vedic --allow-dirty
          sleep 30
          cargo publish -p vedaksha-emit --allow-dirty
          sleep 30
          cargo publish -p vedaksha-locale --allow-dirty
          sleep 30
          cargo publish -p vedaksha-mcp --allow-dirty
          sleep 30
          cargo publish -p vedaksha-wasm --allow-dirty

  publish-npm:
    name: Publish to npm
    needs: [wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vedaksha-wasm
          path: crates/vedaksha-wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        working-directory: crates/vedaksha-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        working-directory: bindings/python
        run: maturin build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: bindings/python/target/wheels/*.whl

  upload-pypi:
    name: Upload to PyPI
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install twine
        run: pip install twine
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  github-release:
    name: Create GitHub Release
    needs: [wasm, publish-crates, publish-npm, upload-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vedaksha-wasm/**/*
            wheels-*/**/*
