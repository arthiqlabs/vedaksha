name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vedaksha-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/vedaksha*

  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack
      - name: Build WASM
        run: wasm-pack build --target web crates/vedaksha-wasm/
      - uses: actions/upload-artifact@v4
        with:
          name: vedaksha-wasm
          path: crates/vedaksha-wasm/pkg/

  publish-crates:
    name: Publish to crates.io
    needs: [build, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (dry-run)
        run: |
          cargo publish -p vedaksha-math --dry-run
          cargo publish -p vedaksha-ephem-core --dry-run
          cargo publish -p vedaksha-graph --dry-run
          cargo publish -p vedaksha-astro --dry-run
          cargo publish -p vedaksha-vedic --dry-run
          cargo publish -p vedaksha-emit --dry-run
          cargo publish -p vedaksha-locale --dry-run
          cargo publish -p vedaksha-mcp --dry-run
          cargo publish -p vedaksha-wasm --dry-run

  github-release:
    name: Create GitHub Release
    needs: [build, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vedaksha-*/**/*
