name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # macOS coverage runs in the Release workflow's mcp-binary build,
    # which exercises both x86_64 and aarch64 Apple targets on tag.
    # Routine CI is Linux-only — x86 vs aarch64 numerics agreement is
    # well-established for the ELP/MPP02 and VSOP87 series we evaluate,
    # and the macOS leg was the slow path historically.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --release
      - name: Test
        run: cargo test --workspace --release
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM
        run: cargo check -p vedaksha-wasm --target wasm32-unknown-unknown

  no-std:
    name: no_std Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check vedaksha-math no_std
        run: cargo check -p vedaksha-math --no-default-features
