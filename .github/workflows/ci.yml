name: CI

# Routine CI gate: fast feedback on every push and PR.
# Heavy validation (full integration tests, clippy across 36k+ lines of
# generated coefficient tables) lives in:
#   - .github/workflows/full-validation.yml — manual + weekly
#   - .github/workflows/release.yml         — every tag
# This workflow targets ~3 minutes total.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests + Tier-2 paper-example acceptance
        # Debug mode — one build artifact set. Unit tests do 1-2 series
        # evaluations each (microseconds even in debug). Tier-2 paper
        # examples does ~10 ELP/MPP02 evals; debug ~50ms each = ~0.5s
        # total. Total target for this step ≤90s on cold cache.
        run: |
          cargo test --workspace --lib --locked
          cargo test -p vedaksha-ephem-core --test lunar_paper_examples --locked
      - name: Format check
        run: cargo fmt --all -- --check

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM (npm binding + Python-host shim)
        run: |
          cargo check -p vedaksha-wasm --target wasm32-unknown-unknown --locked
          cargo check -p vedaksha-py-engine --target wasm32-unknown-unknown --locked

  python:
    name: Python binding (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build the wasm blob from engine source
        run: ./scripts/build-wasm.sh
      - name: Regenerate the parity fixture from the native engine
        run: python tests/conformance/generate_fixture.py
      - name: Install (with test + rest extras)
        run: pip install -e ".[dev,rest]" httpx
      - name: Lint
        run: ruff check src tests
      - name: Test
        # Parity vs the native engine runs here; SPK tests skip without a kernel.
        run: pytest -q

  no-std:
    name: no_std Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check vedaksha-math no_std
        run: cargo check -p vedaksha-math --no-default-features --locked
