name: CI

# Routine CI gate: fast feedback on every push and PR.
# Heavy validation (full integration tests, clippy across 36k+ lines of
# generated coefficient tables) lives in:
#   - .github/workflows/full-validation.yml — manual + weekly
#   - .github/workflows/release.yml         — every tag
# This workflow targets ~3 minutes total.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build (debug)
        run: cargo build --workspace --locked
      - name: Unit tests + Tier-2 paper-example acceptance
        run: |
          cargo test --workspace --lib --release --locked
          cargo test -p vedaksha-ephem-core --test lunar_paper_examples --release --locked
      - name: Format check
        run: cargo fmt --all -- --check

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM
        run: cargo check -p vedaksha-wasm --target wasm32-unknown-unknown --locked

  no-std:
    name: no_std Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check vedaksha-math no_std
        run: cargo check -p vedaksha-math --no-default-features --locked
