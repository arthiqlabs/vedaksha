name: Full Validation

# Comprehensive validation that doesn't run on every push because it's slow:
#   - full release-mode build + integration test suite (oracle comparisons,
#     extended comparisons)
#   - coefficient-blob generator drift check (re-fetches IMCCE primary
#     distributions and verifies sha256 against the committed sidecars)
# Triggers:
#   - manual (workflow_dispatch)
#   - weekly cron (Sunday 04:00 UTC)
# Release-time validation lives in release.yml; this workflow is the
# nightly-style drift catcher between releases.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

env:
  CARGO_TERM_COLOR: always

jobs:
  full-test:
    name: Full Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --workspace --release --locked
      # The SpkReader-backed tests need the 32 MB DE440s kernel, which is
      # gitignored. Per-push CI skips them; this job exists to actually run
      # them, so it fetches the kernel first.
      - name: Download DE440s kernel
        run: bash scripts/download_de440s.sh
      - name: Full test suite (release, all tests including release-only #[ignore]s)
        # `--include-ignored` picks up the #[ignore]d tests whose runtime is
        # only acceptable in release mode (e.g. mcp's 365-day transit search,
        # ephem-core's 17-min Tier-3 legacy oracle).
        #
        # VEDAKSHA_REQUIRE_FIXTURES turns a missing kernel or oracle fixture
        # into a hard failure. Without it these tests return early and report
        # green having verified nothing — which is exactly how the published
        # accuracy claims went unchecked for so long. If this job cannot get
        # its fixtures, it must go red rather than lie.
        env:
          VEDAKSHA_REQUIRE_FIXTURES: '1'
        run: cargo test --workspace --release --locked -- --include-ignored
      - name: Clippy
        env:
          RUSTFLAGS: -D warnings
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check

  coefficient-blob-drift:
    name: Coefficient-blob generator drift (--verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Each generator re-fetches IMCCE primary, regenerates the VDKBLOB1
      # blobs into a temp directory, and exits non-zero if any sha256 has
      # drifted from the committed .bin.sha256 sidecar.
      - name: VSOP87A — regenerate, compare sha256 against committed sidecars
        run: python3 scripts/generate_vsop87a.py --verify --threshold 1e-9
      - name: ELP/MPP02 — regenerate, compare sha256 against committed sidecars
        run: python3 scripts/generate_elpmpp02.py --verify --threshold 1e-6
