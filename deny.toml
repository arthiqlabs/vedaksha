# Vedākṣha dependency policy
# Run: cargo deny check

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
allow = [
    "BUSL-1.1",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Permit path-only / unversioned dev-dependencies inside the workspace.
# `vedaksha-ephem-core` has dev-deps on `vedaksha-astro` and `vedaksha-vedic`
# (which themselves depend on ephem-core) for integration testing.  The
# version field is intentionally omitted so `cargo publish` does not require
# them to exist on crates.io ahead of ephem-core.  This option applies to
# private/dev-dep wildcards only — public deps still must declare a version.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
